# Render.com blueprint.  In Render: New -> Blueprint -> connect this repo.
#
# PERMANENT setup: always-on Starter instance + a 1 GB persistent disk, so your
# photo/video uploads and admin edits are saved and survive restarts/redeploys.
# (To drop back to a free trial: set `plan: free`, and comment out the two
#  VENOX_DATA_DIR/VENOX_MEDIA_DIR env vars and the `disk:` block.)
services:
  - type: web
    name: venox
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: VENOX_ADMIN_PASSWORD
        sync: false            # you set this in the Render dashboard at deploy time
      - key: VENOX_SESSION_SECRET
        generateValue: true    # Render generates a strong random value
      - key: VENOX_DATA_DIR
        value: /var/data
      - key: VENOX_MEDIA_DIR
        value: /var/data/media
    disk:
      name: venox-data
      mountPath: /var/data
      sizeGB: 1
